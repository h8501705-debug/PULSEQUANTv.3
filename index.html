<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Indian Stocks Watchlist - NIFTY 500</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0b0f1a;
            color: #d1d4dc;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 25px;
            color: #fff;
            font-weight: 500;
            border-bottom: 1px solid #2a2e39;
            padding-bottom: 15px;
        }
        
        .import-section {
            background: #131722;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #2a2e39;
        }
        
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
        }
        
        #symbolSearch {
            width: 100%;
            padding: 12px 15px;
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        #symbolSearch:focus {
            border-color: #2962ff;
        }
        
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        
        .search-results.show {
            display: block;
        }
        
        .search-result-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #2a2e39;
            transition: background 0.2s;
        }
        
        .search-result-item:hover {
            background: #2a2e39;
        }
        
        .search-result-item .symbol {
            font-weight: 600;
            color: #fff;
        }
        
        .search-result-item .exchange {
            font-size: 0.8rem;
            color: #5d6b82;
            margin-left: 10px;
        }
        
        .selected-symbols {
            margin-top: 15px;
        }
        
        .selected-tag {
            display: inline-flex;
            align-items: center;
            background: #1e222d;
            border: 1px solid #2962ff;
            border-radius: 20px;
            padding: 5px 12px;
            margin: 0 8px 8px 0;
            color: #fff;
        }
        
        .selected-tag .remove {
            margin-left: 8px;
            color: #ff4444;
            cursor: pointer;
            font-weight: bold;
        }
        
        .selected-tag .remove:hover {
            color: #ff6666;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #2962ff;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        
        button:hover {
            background: #0039cb;
        }
        
        .stats {
            margin: 15px 0;
            color: #5d6b82;
            font-size: 0.9rem;
        }
        
        .watchlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .watchlist-header h2 {
            color: #fff;
            font-size: 1.3rem;
        }
        
        .clear-btn {
            padding: 6px 12px;
            background: #ff4444;
            width: auto;
            font-size: 0.9rem;
        }
        
        .clear-btn:hover {
            background: #cc0000;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        #searchInput {
            width: 100%;
            padding: 12px 15px;
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        
        #searchInput:focus {
            outline: none;
            border-color: #2962ff;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #131722;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2e39;
        }
        
        th {
            text-align: left;
            padding: 15px;
            background: #1e222d;
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #2a2e39;
            color: #d1d4dc;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        tbody tr {
            transition: background 0.2s;
        }
        
        tbody tr:hover {
            background: #1e222d;
        }
        
        .symbol {
            font-weight: 600;
            color: #fff;
            cursor: pointer;
        }
        
        .symbol:hover {
            color: #2962ff;
        }
        
        .index {
            color: #5d6b82;
            font-family: monospace;
        }
        
        .delete-btn {
            background: #ff4444;
            padding: 4px 10px;
            width: auto;
            font-size: 0.8rem;
            border-radius: 4px;
        }
        
        .delete-btn:hover {
            background: #cc0000;
        }
        
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #5d6b82;
            font-style: italic;
        }
        
        .exchange-badge {
            font-size: 0.7rem;
            background: #2a2e39;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            color: #5d6b82;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Indian Stocks Watchlist - NIFTY 500</h1>
        
        <div class="import-section">
            <label>🔍 Search and Add Stocks</label>
            <div class="search-container">
                <input type="text" id="symbolSearch" placeholder="Type to search stocks (e.g., RELIANCE, TCS, HDFC)" autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div id="selectedSymbols" class="selected-symbols"></div>
            
            <button onclick="addSelectedSymbols()">Add Selected to Watchlist</button>
        </div>
        
        <div class="watchlist-header">
            <h2>📋 My Watchlist (NIFTY 500)</h2>
            <button class="clear-btn" onclick="clearWatchlist()">Clear All</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Filter watchlist..." onkeyup="filterSymbols()">
        </div>
        
        <div class="stats" id="stats"></div>
        
        <table id="table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Symbol</th>
                    <th>Exchange</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
